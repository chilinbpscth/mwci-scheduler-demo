<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理端（Demo）</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page">
    <div class="wrap">
      <header class="header-bar">
        <div>
          <div class="header-bar__title">管理端（Demo）</div>
          <div class="header-bar__sub">快速修改班別/老師/日期/主題（demo 用）</div>
        </div>
        <div class="header-bar__actions">
          <a href="/" class="btn btn-secondary">返回老師端</a>
        </div>
      </header>

      <main class="admin-grid">
        <section class="card">
          <div class="card__title">快速設定</div>
          <p class="hint" style="margin-bottom: 0.75rem">（demo）輸入 JSON 後按「儲存」，就會覆蓋伺服器資料。</p>
          <textarea id="json" class="textarea-json" rows="18" spellcheck="false"></textarea>
          <div class="form-actions">
            <button type="button" id="btnLoad" class="btn btn-secondary">載入現有</button>
            <button type="button" id="btnSave" class="btn btn-primary">儲存</button>
          </div>
          <div id="status" class="status mt-status"></div>
        </section>
      </main>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      async function api(method, url, body) {
        const res = await fetch(url, {
          method,
          headers: body ? { "Content-Type": "application/json" } : undefined,
          body: body ? JSON.stringify(body) : undefined,
        });
        if (!res.ok) throw new Error(await res.text());
        return await res.json();
      }

      async function load() {
        $("status").classList.remove("status--error");
        $("status").textContent = "載入中…";
        const state = await api("GET", "/api/state");
        $("json").value = JSON.stringify(
          {
            classes: state.classes,
            teachers: state.teachers,
            dates: state.dates,
            topics: state.topics,
            specialTasks: state.specialTasks,
          },
          null,
          2
        );
        $("status").textContent = "已載入";
      }

      $("btnLoad").onclick = () =>
        load().catch((e) => {
          $("status").textContent = "載入失敗 — 請經伺服器開頁";
          $("status").classList.add("status--error");
          console.error(e);
        });

      $("btnSave").onclick = async () => {
        try {
          $("status").classList.remove("status--error");
          $("status").textContent = "儲存中…";
          const body = JSON.parse($("json").value);
          await api("POST", "/api/admin/set", body);
          $("status").textContent = "已儲存";
        } catch (e) {
          $("status").textContent = "儲存失敗（JSON 格式可能錯）";
          $("status").classList.add("status--error");
          console.error(e);
        }
      };

      load().catch((e) => {
        $("status").textContent = "載入失敗 — 請經伺服器開頁";
        $("status").classList.add("status--error");
        console.error(e);
      });
    </script>
  </body>
</html>

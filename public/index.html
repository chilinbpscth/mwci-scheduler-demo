<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>排課系統 Demo（免登入）</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div class="max-w-6xl mx-auto p-4">
      <header class="bg-white border rounded-lg p-4 flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
        <div>
          <div class="text-xl font-bold">排課系統 Demo（免登入）</div>
          <div class="text-sm text-slate-500">老師只可揀位鎖定；生成/匯出由管理員處理</div>
        </div>
        <div class="flex gap-2">
          <a href="/admin.html" class="px-3 py-2 rounded border bg-slate-50 hover:bg-slate-100 text-sm">管理端</a>
        </div>
      </header>

      <main class="grid grid-cols-1 lg:grid-cols-4 gap-4 mt-4">
        <section class="lg:col-span-1 bg-white border rounded-lg p-4">
          <div class="font-bold mb-2">老師（免登入）</div>
          <label class="text-sm text-slate-600">選擇老師</label>
          <select id="teacherSelect" class="w-full border rounded p-2 mt-1"></select>
          <div class="text-xs text-slate-500 mt-2">點選右邊矩陣嘅格子鎖位。</div>

          <div class="mt-4 border-t pt-4">
            <div class="font-bold mb-2">操作</div>
            <button id="btnRefresh" class="w-full px-3 py-2 rounded border bg-slate-50 hover:bg-slate-100 text-sm">刷新</button>
          </div>

          <div class="mt-4 border-t pt-4">
            <div class="font-bold mb-2">提示</div>
            <ul class="text-sm text-slate-600 list-disc pl-5 space-y-1">
              <li>已被鎖定嘅格會顯示老師名。</li>
              <li>生成後只會為未鎖定位分配。</li>
            </ul>
          </div>
        </section>

        <section class="lg:col-span-3 bg-white border rounded-lg p-4 overflow-x-auto">
          <div class="flex items-center justify-between">
            <div class="font-bold">空格矩陣</div>
            <div id="status" class="text-sm text-slate-500"></div>
          </div>
          <div class="mt-3">
            <table class="min-w-full border text-sm" id="matrix"></table>
          </div>
        </section>

        <section class="lg:col-span-4 bg-white border rounded-lg p-4">
          <div class="font-bold">生成預覽</div>
          <div class="text-sm text-slate-600 mt-2">
            呢頁（老師端）唔提供生成/匯出。\n
            請到 <a class="underline text-blue-700" href="/admin.html">管理端</a> 生成同下載 Excel。
          </div>
        </section>
      </main>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      async function api(method, url, body) {
        const res = await fetch(url, {
          method,
          headers: body ? { "Content-Type": "application/json" } : undefined,
          body: body ? JSON.stringify(body) : undefined,
        });
        if (!res.ok) throw new Error(await res.text());
        return await res.json();
      }

      function lockFor(state, dateVal, className) {
        return state.locks.find((l) => l.status === "locked" && l.dateVal === dateVal && l.className === className);
      }

      function topicFor(state, dateVal, className) {
        return state.topics[`${dateVal}_${className}`] || { text: "", color: "#ffffff" };
      }

      function renderMatrix(state) {
        const table = $("matrix");
        table.innerHTML = "";

        const thead = document.createElement("thead");
        const hr = document.createElement("tr");
        hr.innerHTML = `<th class="border p-2 bg-slate-50 sticky left-0">日期</th>` + state.classes.map((c) => `<th class="border p-2 bg-slate-50">${c.name}</th>`).join("");
        thead.appendChild(hr);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        for (const d of state.dates.filter((x) => x.selected !== false)) {
          const tr = document.createElement("tr");
          const dateCell = document.createElement("td");
          dateCell.className = "border p-2 bg-slate-50 sticky left-0 font-bold";
          dateCell.textContent = `${d.val} (${d.weekday})`;
          tr.appendChild(dateCell);

          for (const c of state.classes) {
            const td = document.createElement("td");
            td.className = "border p-2 align-top";
            const t = topicFor(state, d.val, c.name);
            const lock = lockFor(state, d.val, c.name);
            td.style.background = t.color || "#ffffff";

            const content = document.createElement("div");
            content.className = "flex flex-col gap-1";

            const topic = document.createElement("div");
            topic.className = "text-xs text-slate-700";
            topic.textContent = t.text || "";
            content.appendChild(topic);

            const teacher = document.createElement("div");
            teacher.className = lock ? "text-sm font-bold text-blue-900" : "text-sm text-slate-400";
            teacher.textContent = lock ? `已鎖：${lock.teacher}` : "未鎖";
            content.appendChild(teacher);

            const btn = document.createElement("button");
            btn.className = lock
              ? "mt-1 px-2 py-1 rounded border text-xs bg-white/70 hover:bg-white"
              : "mt-1 px-2 py-1 rounded bg-blue-600 hover:bg-blue-700 text-white text-xs";
            btn.textContent = lock ? "解除" : "鎖位";

            btn.onclick = async () => {
              const teacherName = $("teacherSelect").value;
              if (!teacherName) return;
              if (lock) {
                await api("POST", "/api/teacher/locks/unlock", { lockId: lock.id });
              } else {
                await api("POST", "/api/teacher/locks/lock", { teacher: teacherName, dateVal: d.val, className: c.name });
              }
              await refresh();
            };
            content.appendChild(btn);

            td.appendChild(content);
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
      }

      async function refresh() {
        $("status").textContent = "載入中…";
        const state = await api("GET", "/api/state");

        const sel = $("teacherSelect");
        const old = sel.value;
        sel.innerHTML = `<option value="">（選擇）</option>` + state.teachers.map((t) => `<option value="${t.name}">${t.name}</option>`).join("");
        if (old) sel.value = old;

        renderMatrix(state);
        $("status").textContent = `老師：${state.teachers.length}｜班別：${state.classes.length}｜日期：${state.dates.filter((d)=>d.selected!==false).length}`;
      }

      $("btnRefresh").onclick = refresh;
      // Teachers page intentionally has no generate/export.

      refresh().catch((e) => {
        $("status").textContent = "載入失敗";
        console.error(e);
      });

      // Teacher live view: poll locks/state periodically (simple + reliable).
      // Keep selection stable via refresh() logic.
      setInterval(() => {
        refresh().catch(() => {});
      }, 4000);
    </script>
  </body>
</html>

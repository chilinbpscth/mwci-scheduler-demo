<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>排課系統 Demo（免登入）</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page">
    <div class="wrap">
      <header class="header-bar">
        <div>
          <div class="header-bar__title">排課系統 Demo（免登入）</div>
          <div class="header-bar__sub">老師揀位鎖定 → 系統補剩餘 → 下載 Excel</div>
        </div>
        <div class="header-bar__actions">
          <a href="/admin.html" class="btn btn-secondary">管理端</a>
          <button type="button" id="btnExport" class="btn btn-primary">下載 Excel</button>
        </div>
      </header>

      <main class="grid-demo">
        <section class="card">
          <div class="card__title">老師（免登入）</div>
          <label class="label" for="teacherSelect">選擇老師</label>
          <select id="teacherSelect" class="select"></select>
          <p class="hint">點選右邊矩陣嘅格子鎖位。</p>

          <div class="card__divider">
            <div class="card__title">操作</div>
            <div class="btn-stack">
              <button type="button" id="btnRefresh" class="btn btn-secondary btn-block">刷新</button>
              <button type="button" id="btnGenerate" class="btn btn-success btn-block">生成（補剩餘）</button>
            </div>
          </div>

          <div class="card__divider">
            <div class="card__title">提示</div>
            <ul class="tips">
              <li>已被鎖定嘅格會顯示老師名。</li>
              <li>生成後只會為未鎖定位分配。</li>
            </ul>
          </div>
        </section>

        <section class="card">
          <div class="matrix-toolbar">
            <div class="card__title" style="margin: 0">空格矩陣</div>
            <div id="status" class="status"></div>
          </div>
          <div class="table-scroll">
            <table class="data-table" id="matrix"></table>
          </div>
        </section>

        <section class="card grid-demo__full">
          <div class="card__title">生成預覽（簡化）</div>
          <pre id="preview" class="preview-pre"></pre>
        </section>
      </main>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      async function api(method, url, body) {
        const res = await fetch(url, {
          method,
          headers: body ? { "Content-Type": "application/json" } : undefined,
          body: body ? JSON.stringify(body) : undefined,
        });
        if (!res.ok) throw new Error(await res.text());
        const ct = res.headers.get("content-type") || "";
        if (ct.includes("application/json")) return await res.json();
        return await res.text();
      }

      function lockFor(state, dateVal, className) {
        return state.locks.find((l) => l.status === "locked" && l.dateVal === dateVal && l.className === className);
      }

      function topicFor(state, dateVal, className) {
        return state.topics[`${dateVal}_${className}`] || { text: "", color: "#ffffff" };
      }

      function renderMatrix(state) {
        const table = $("matrix");
        table.innerHTML = "";

        const thead = document.createElement("thead");
        const hr = document.createElement("tr");
        const th0 = document.createElement("th");
        th0.className = "data-table__sticky";
        th0.textContent = "日期";
        hr.appendChild(th0);
        for (const c of state.classes) {
          const th = document.createElement("th");
          th.textContent = c.name;
          hr.appendChild(th);
        }
        thead.appendChild(hr);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        for (const d of state.dates.filter((x) => x.selected !== false)) {
          const tr = document.createElement("tr");
          const dateCell = document.createElement("td");
          dateCell.className = "data-table__sticky";
          dateCell.textContent = `${d.val} (${d.weekday})`;
          tr.appendChild(dateCell);

          for (const c of state.classes) {
            const td = document.createElement("td");
            const t = topicFor(state, d.val, c.name);
            const lock = lockFor(state, d.val, c.name);
            td.style.background = t.color || "#ffffff";

            const content = document.createElement("div");
            content.className = "matrix-cell-inner";

            const topic = document.createElement("div");
            topic.className = "matrix-topic";
            topic.textContent = t.text || "";
            content.appendChild(topic);

            const teacher = document.createElement("div");
            teacher.className = lock ? "matrix-lock matrix-lock--yes" : "matrix-lock matrix-lock--no";
            teacher.textContent = lock ? `已鎖：${lock.teacher}` : "未鎖";
            content.appendChild(teacher);

            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = lock ? "btn btn-sm btn-secondary btn-matrix-unlock" : "btn btn-sm btn-primary";
            btn.textContent = lock ? "解除" : "鎖位";

            btn.onclick = async () => {
              const teacherName = $("teacherSelect").value;
              if (!teacherName) {
                $("status").textContent = "請先揀老師";
                $("status").classList.add("status--error");
                return;
              }
              $("status").classList.remove("status--error");
              try {
                if (lock) {
                  await api("POST", "/api/locks/unlock", { lockId: lock.id });
                } else {
                  await api("POST", "/api/locks/lock", { teacher: teacherName, dateVal: d.val, className: c.name });
                }
                await refresh();
              } catch (e) {
                $("status").textContent = "操作失敗（睇 console）";
                $("status").classList.add("status--error");
                console.error(e);
              }
            };
            content.appendChild(btn);

            td.appendChild(content);
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
      }

      async function refresh() {
        $("status").classList.remove("status--error");
        $("status").textContent = "載入中…";
        const state = await api("GET", "/api/state");

        const sel = $("teacherSelect");
        const old = sel.value;
        sel.innerHTML = `<option value="">（選擇）</option>` + state.teachers.map((t) => `<option value="${t.name}">${t.name}</option>`).join("");
        if (old) sel.value = old;

        renderMatrix(state);
        $("status").textContent = `老師：${state.teachers.length}｜班別：${state.classes.length}｜日期：${state.dates.filter((d) => d.selected !== false).length}`;
      }

      $("btnRefresh").onclick = () => refresh().catch(onRefreshError);
      $("btnGenerate").onclick = async () => {
        $("preview").textContent = "生成中…";
        try {
          const out = await api("POST", "/api/generate");
          $("preview").textContent = JSON.stringify(out.schedule, null, 2);
        } catch (e) {
          $("preview").textContent = String(e);
          console.error(e);
        }
      };
      $("btnExport").onclick = () => {
        window.location.href = "/api/export.xlsx";
      };

      function onRefreshError(e) {
        $("status").textContent = "載入失敗 — 請確認經伺服器開頁（例如 npm run dev），唔好用 file://";
        $("status").classList.add("status--error");
        console.error(e);
      }

      refresh().catch(onRefreshError);
    </script>
  </body>
</html>
